name: Cleanup Old Images

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Delete old package versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: libex
          package-type: container
          min-versions-to-keep: 5
          delete-only-untagged-versions: true